syntax = "proto3";

package io.github.no1evil.proto.v1.example;

option java_multiple_files = true;
option java_package = "io.github.no1evil.api.v1.example";
option java_outer_classname = "ExampleModelsProto";

import "google/protobuf/timestamp.proto";

message MyModel {
  string my_string_var = 1;
  int32 my_int_var = 2;
}

message MyExtensiveModel {
  optional string id = 1;
  optional MyModel model = 2;
  google.protobuf.Timestamp issued_at = 3;
}