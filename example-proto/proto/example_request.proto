syntax = "proto3";

package io.github.no1evil.proto.v1.example;

option java_multiple_files = true;
option java_package = "io.github.no1evil.api.v1.example";
option java_outer_classname = "ExampleRequestProto";

message HelloRequest {
  string id = 1;
}

message WuhRequest {
  string id = 1;
  optional string what = 2;
}